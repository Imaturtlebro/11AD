<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebXR Voxel Quest Engine</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }

        canvas {
            display: block;
        }

        #overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>

<body>
    <div id="overlay">
        <h2>WebXR Voxel Engine</h2>
        <p id="status">Status: Waiting for Rapier...</p>
        <pre id="logs" style="font-size: 10px; color: #ff5555;"></pre>
    </div>
    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

        // Log helper
        function log(msg) {
            console.log(msg);
            const el = document.getElementById('logs');
            if (el) el.innerText += msg + '\n';
        }

        function setStatus(msg) {
            const el = document.getElementById('status');
            if (el) el.innerText = 'Status: ' + msg;
        }

        // --- Configuration ---
        const VOXEL_SIZE = 0.5;
        const GRID_SIZE = 10;
        const TRACKED_JOINTS = [
            { name: 'palm', size: { x: 0.07, y: 0.02, z: 0.07 }, color: 0x34495e },
            { name: 'thumb-phalanx-distal', size: { x: 0.02, y: 0.02, z: 0.02 }, color: 0x2980b9 },
            { name: 'index-finger-phalanx-distal', size: { x: 0.018, y: 0.018, z: 0.018 }, color: 0x3498db },
            { name: 'middle-finger-phalanx-distal', size: { x: 0.018, y: 0.018, z: 0.018 }, color: 0x3498db },
            { name: 'ring-finger-phalanx-distal', size: { x: 0.017, y: 0.017, z: 0.017 }, color: 0x3498db },
            { name: 'pinky-finger-phalanx-distal', size: { x: 0.015, y: 0.015, z: 0.015 }, color: 0x2980b9 }
        ];

        // --- State ---
        let scene, camera, renderer, physicsWorld;
        let RAPIER;
        let controllers = [], hands = [];
        let physicsBodies = [];
        let physicalVoxelJoints = [];

        // --- Start Engine Immediately ---
        init();

        // --- Load Physics in Background ---
        log('Starting background Rapier load...');
        import('https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.11.2/rapier.es.js').then(async (R) => {
            log('Rapier module ready.');
            try {
                await R.init();
                RAPIER = R;
                log('Rapier WASM initialized.');
                setupPhysics();
                setupHandPhysicsColliders(); // Generate physics targets AFTER Rapier initializes safely
                setStatus('Physics Active');
            } catch (e) {
                log('Rapier Init Error: ' + e.message);
                setStatus('Physics Failed');
            }
        }).catch(err => {
            log('Rapier Load Error: ' + err.message);
            setStatus('Network Error');
        });

        function init() {
            log('Initializing Three.js...');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x3498db); // Bright blue background to verify rendering

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);
            camera.position.set(0, 1.6, 3); // Start 3 meters back

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Fix: Explicitly request hand-tracking features
            document.body.appendChild(VRButton.createButton(renderer, {
                requiredFeatures: ['local-floor'],
                optionalFeatures: ['hand-tracking']
            }));

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            // Reference Sphere
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshStandardMaterial({ color: 0xffff00 }));
            sphere.position.set(0, 1.6, -2);
            scene.add(sphere);

            // 1. Create Terrain Visuals
            createTerrainVisuals();

            // 2. Create Debug Objects
            const debugCube = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.2, 0.2),
                new THREE.MeshStandardMaterial({ color: 0xff00ff })
            );
            debugCube.position.set(0, 1.2, -1);
            scene.add(debugCube);

            // 3. Setup VR Input (Graphics elements only)
            setupVR();

            log('Starting loop...');
            renderer.setAnimationLoop(update);
        }

        function createTerrainVisuals() {
            const geometry = new THREE.BoxGeometry(VOXEL_SIZE, VOXEL_SIZE, VOXEL_SIZE);
            const mat = new THREE.MeshStandardMaterial({ color: 0x27ae60, roughness: 0.8 });
            for (let x = -GRID_SIZE / 2; x < GRID_SIZE / 2; x++) {
                for (let z = -GRID_SIZE / 2; z < GRID_SIZE / 2; z++) {
                    const mesh = new THREE.Mesh(geometry, mat);
                    mesh.position.set(x * VOXEL_SIZE, -VOXEL_SIZE / 2, z * VOXEL_SIZE);
                    scene.add(mesh);
                    physicsBodies.push({ mesh, body: null }); // Body added later
                }
            }
        }

        function setupPhysics() {
            log('Building physics world...');
            physicsWorld = new RAPIER.World({ x: 0.0, y: -9.81, z: 0.0 });

            // Add colliders to terrain
            physicsBodies.forEach(obj => {
                const p = obj.mesh.position;
                const body = physicsWorld.createRigidBody(RAPIER.RigidBodyDesc.fixed().setTranslation(p.x, p.y, p.z));
                physicsWorld.createCollider(RAPIER.ColliderDesc.cuboid(VOXEL_SIZE / 2, VOXEL_SIZE / 2, VOXEL_SIZE / 2), body);
                obj.body = body;
            });

            // Create Test Box
            const size = 0.3;
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(size, size, size),
                new THREE.MeshStandardMaterial({ color: 0xe67e22, roughness: 0.4 })
            );
            scene.add(mesh);

            const bodyDesc = RAPIER.RigidBodyDesc.dynamic()
                .setTranslation(0, 1.2, -0.4)
                .setLinearDamping(1.0)
                .setAngularDamping(1.0);
            const body = physicsWorld.createRigidBody(bodyDesc);
            physicsWorld.createCollider(RAPIER.ColliderDesc.cuboid(size / 2, size / 2, size / 2), body);

            physicsBodies.push({ mesh, body });
        }

        function setupVR() {
            const controllerModelFactory = new XRControllerModelFactory();

            for (let i = 0; i < 2; i++) {
                // Controllers (Grip)
                const grip = renderer.xr.getControllerGrip(i);
                grip.add(controllerModelFactory.createControllerModel(grip));
                scene.add(grip);

                // Hands
                const hand = renderer.xr.getHand(i);
                scene.add(hand);
                hands.push(hand);

                // Graphics meshes for each joint
                TRACKED_JOINTS.forEach(config => {
                    const mesh = new THREE.Mesh(
                        new THREE.BoxGeometry(config.size.x, config.size.y, config.size.z),
                        new THREE.MeshStandardMaterial({ color: config.color, roughness: 0.7 })
                    );
                    mesh.visible = false;
                    scene.add(mesh);

                    physicalVoxelJoints.push({
                        mesh: mesh,
                        body: null,
                        handRef: hand,
                        jointName: config.name,
                        configSize: config.size
                    });
                });
            }
        }

        function setupHandPhysicsColliders() {
            if (!RAPIER || !physicsWorld) return;
            log('Attaching kinematic colliders to voxel joints...');

            physicalVoxelJoints.forEach(jointItem => {
                const bodyDesc = RAPIER.RigidBodyDesc.kinematicPositionBased();
                const body = physicsWorld.createRigidBody(bodyDesc);
                const colDesc = RAPIER.ColliderDesc.cuboid(
                    jointItem.configSize.x / 2,
                    jointItem.configSize.y / 2,
                    jointItem.configSize.z / 2
                );
                physicsWorld.createCollider(colDesc, body);
                jointItem.body = body;
            });
        }

        let firstFrame = true;
        function update() {
            if (firstFrame) {
                log('First frame update triggered.');
                firstFrame = false;
            }

            // Sync Hands
            const tempPos = new THREE.Vector3();
            const tempQuat = new THREE.Quaternion();

            physicalVoxelJoints.forEach(({ mesh, body, handRef, jointName }) => {
                // Fix: Access joints directly from the Three.js joints object
                const joint = handRef.joints ? handRef.joints[jointName] : null;

                if (handRef.visible && joint) {
                    joint.getWorldPosition(tempPos);
                    joint.getWorldQuaternion(tempQuat);
                    mesh.position.copy(tempPos);
                    mesh.quaternion.copy(tempQuat);
                    mesh.visible = true;

                    if (body) {
                        body.setNextKinematicTranslation({ x: tempPos.x, y: tempPos.y, z: tempPos.z });
                        body.setNextKinematicRotation({ x: tempQuat.x, y: tempQuat.y, z: tempQuat.z, w: tempQuat.w });
                    }
                } else {
                    mesh.visible = false;
                    if (body) {
                        body.setNextKinematicTranslation({ x: 0, y: -100, z: 0 });
                    }
                }
            });

            if (physicsWorld) {
                physicsWorld.step();

                physicsBodies.forEach(({ mesh, body }) => {
                    if (!body) return;
                    const t = body.translation();
                    const r = body.rotation();
                    mesh.position.set(t.x, t.y, t.z);
                    mesh.quaternion.set(r.x, r.y, r.z, r.w);
                });
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', onResize);
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>

</html>
