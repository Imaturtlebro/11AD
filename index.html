<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebXR Voxel Quest Engine</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }

        canvas {
            display: block;
        }

        #overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>

<body>
    <div id="overlay">
        <h2>WebXR Voxel Engine</h2>
        <p id="status">Status: Waiting for Rapier...</p>
        <pre id="logs" style="font-size: 10px; color: #ff5555;"></pre>
    </div>
    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

        // Log helper
        function log(msg) {
            console.log(msg);
            const el = document.getElementById('logs');
            if (el) el.innerText += msg + '\n';
        }

        function setStatus(msg) {
            const el = document.getElementById('status');
            if (el) el.innerText = 'Status: ' + msg;
        }

        // --- Configuration ---
        const VOXEL_SIZE = 0.5;
        const GRID_SIZE = 10;
        const CONTROLLER_PROXIES = [
            { id: 0, hand: 'left', size: { x: 0.08, y: 0.06, z: 0.12 }, color: 0x34495e },
            { id: 1, hand: 'right', size: { x: 0.08, y: 0.06, z: 0.12 }, color: 0x2c3e50 }
        ];

        // --- State ---
        let scene, camera, renderer, physicsWorld;
        let playerGroup; // Parent rig to move camera + controllers together
        let RAPIER;
        let physicsBodies = [];
        let physicalVoxelJoints = [];

        // --- Start Engine Immediately ---
        init();

        // --- Load Physics in Background ---
        log('Starting background Rapier load...');
        import('https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.11.2/rapier.es.js').then(async (R) => {
            log('Rapier module ready.');
            try {
                await R.init();
                RAPIER = R;
                log('Rapier WASM initialized.');
                setupPhysics();
                setupHandPhysicsColliders(); // Generate physics targets AFTER Rapier initializes safely
                setStatus('Physics Active');
            } catch (e) {
                log('Rapier Init Error: ' + e.message);
                setStatus('Physics Failed');
            }
        }).catch(err => {
            log('Rapier Load Error: ' + err.message);
            setStatus('Network Error');
        });

        function init() {
            log('Initializing Three.js...');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x3498db); // Bright blue background

            // Fix 1: Create Player Rig Group for Locomotion
            playerGroup = new THREE.Group();
            scene.add(playerGroup);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);
            playerGroup.add(camera); // Camera must be child of rig

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            document.body.appendChild(VRButton.createButton(renderer, {
                requiredFeatures: ['local-floor']
            }));

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            // Reference Sphere
            const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshStandardMaterial({ color: 0xffff00 }));
            sphere.position.set(0, 1.6, -2);
            scene.add(sphere);

            // 1. Create Terrain Visuals
            createTerrainVisuals();

            // 2. Create Debug Objects
            const debugCube = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.2, 0.2),
                new THREE.MeshStandardMaterial({ color: 0xff00ff })
            );
            debugCube.position.set(0, 1.2, -1);
            scene.add(debugCube);

            // 3. Setup VR Input
            setupVR();

            log('Starting loop...');
            renderer.setAnimationLoop(update);
        }

        function createTerrainVisuals() {
            const geometry = new THREE.BoxGeometry(VOXEL_SIZE, VOXEL_SIZE, VOXEL_SIZE);
            const mat = new THREE.MeshStandardMaterial({ color: 0x27ae60, roughness: 0.8 });
            for (let x = -GRID_SIZE / 2; x < GRID_SIZE / 2; x++) {
                for (let z = -GRID_SIZE / 2; z < GRID_SIZE / 2; z++) {
                    const mesh = new THREE.Mesh(geometry, mat);
                    mesh.position.set(x * VOXEL_SIZE, -VOXEL_SIZE / 2, z * VOXEL_SIZE);
                    scene.add(mesh);
                    physicsBodies.push({ mesh, body: null });
                }
            }
        }

        function setupPhysics() {
            log('Building physics world...');
            physicsWorld = new RAPIER.World({ x: 0.0, y: -9.81, z: 0.0 });

            // Add colliders to terrain
            physicsBodies.forEach(obj => {
                const p = obj.mesh.position;
                const body = physicsWorld.createRigidBody(RAPIER.RigidBodyDesc.fixed().setTranslation(p.x, p.y, p.z));
                physicsWorld.createCollider(RAPIER.ColliderDesc.cuboid(VOXEL_SIZE / 2, VOXEL_SIZE / 2, VOXEL_SIZE / 2), body);
                obj.body = body;
            });

            // Create Test Box
            const size = 0.3;
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(size, size, size),
                new THREE.MeshStandardMaterial({ color: 0xe67e22, roughness: 0.4 })
            );
            scene.add(mesh);

            const bodyDesc = RAPIER.RigidBodyDesc.dynamic()
                .setTranslation(0, 1.5, -0.6)
                .setLinearDamping(1.0)
                .setAngularDamping(1.0);
            const body = physicsWorld.createRigidBody(bodyDesc);
            physicsWorld.createCollider(RAPIER.ColliderDesc.cuboid(size / 2, size / 2, size / 2), body);

            physicsBodies.push({ mesh, body });
        }

        function setupVR() {
            const controllerModelFactory = new XRControllerModelFactory();
            physicalVoxelJoints = [];

            for (let i = 0; i < 2; i++) {
                // Controller group handles ray inputs/gamepad maps
                const controller = renderer.xr.getController(i);
                playerGroup.add(controller);

                // Controller grip group handles physical controller positioning
                const grip = renderer.xr.getControllerGrip(i);
                grip.add(controllerModelFactory.createControllerModel(grip));
                playerGroup.add(grip); // Must attach to player rig container

                const config = CONTROLLER_PROXIES[i];

                // Create visual proxy box representation
                const mesh = new THREE.Mesh(
                    new THREE.BoxGeometry(config.size.x, config.size.y, config.size.z),
                    new THREE.MeshStandardMaterial({ color: config.color, roughness: 0.5 })
                );

                // Fix 2: Nest mesh directly into grip group. Three.js now tracks its layout locally
                grip.add(mesh);

                const item = {
                    mesh: mesh,
                    body: null,
                    gripRef: grip,
                    controllerRef: controller,
                    configSize: config.size,
                    inputSource: null
                };

                // Safely track session input connection lifecycle
                controller.addEventListener('connected', (event) => {
                    item.inputSource = event.data;
                    log('Connected controller: ' + event.data.handedness);
                });
                controller.addEventListener('disconnected', () => {
                    item.inputSource = null;
                    log('Controller disconnected');
                });

                physicalVoxelJoints.push(item);
            }
        }

        function setupHandPhysicsColliders() {
            if (!RAPIER || !physicsWorld) return;
            log('Attaching kinematic colliders to VR controllers...');

            physicalVoxelJoints.forEach(item => {
                const bodyDesc = RAPIER.RigidBodyDesc.kinematicPositionBased();
                const body = physicsWorld.createRigidBody(bodyDesc);
                const colDesc = RAPIER.ColliderDesc.cuboid(
                    item.configSize.x / 2,
                    item.configSize.y / 2,
                    item.configSize.z / 2
                );
                physicsWorld.createCollider(colDesc, body);
                item.body = body;
            });
        }

        // --- Thumbstick Locomotion Logic ---
        const moveSpeed = 0.04;
        const moveDirection = new THREE.Vector3();
        const frontVector = new THREE.Vector3();
        const sideVector = new THREE.Vector3();
        const camRotation = new THREE.Quaternion();

        function handleLocomotion() {
            physicalVoxelJoints.forEach((item) => {
                if (item.inputSource && item.inputSource.gamepad) {
                    const gamepad = item.inputSource.gamepad;

                    // Walk using Left Controller
                    if (item.inputSource.handedness === 'left') {
                        // Fix 3: Handle structural differences in WebXR gamepad mapping layouts safely
                        let xAxis = 0;
                        let yAxis = 0;
                        if (gamepad.axes.length >= 4) {
                            xAxis = Math.abs(gamepad.axes[2]) > 0.1 ? gamepad.axes[2] : gamepad.axes[0];
                            yAxis = Math.abs(gamepad.axes[3]) > 0.1 ? gamepad.axes[3] : gamepad.axes[1];
                        } else if (gamepad.axes.length >= 2) {
                            xAxis = gamepad.axes[0];
                            yAxis = gamepad.axes[1];
                        }

                        // Filter active input through a minimal drift deadzone
                        if (Math.abs(xAxis) > 0.1 || Math.abs(yAxis) > 0.1) {
                            camera.getWorldQuaternion(camRotation);

                            // Project looking direction flatly onto the ground plane (XZ plane)
                            frontVector.set(0, 0, -1).applyQuaternion(camRotation);
                            frontVector.y = 0;
                            frontVector.normalize();

                            // Project normal side looking vectors flatly onto ground plane
                            sideVector.set(1, 0, 0).applyQuaternion(camRotation);
                            sideVector.y = 0;
                            sideVector.normalize();

                            // Accumulate vectors (WebXR up on stick is negative Y)
                            moveDirection.copy(frontVector).multiplyScalar(-yAxis);
                            moveDirection.addScaledVector(sideVector, xAxis);
                            moveDirection.normalize().multiplyScalar(moveSpeed);

                            // Translate the entire local tracking ecosystem container
                            playerGroup.position.add(moveDirection);
                        }
                    }
                }
            });
        }

        const tempPos = new THREE.Vector3();
        const tempQuat = new THREE.Quaternion();

        function update() {
            // Apply joystick motion offsets
            handleLocomotion();

            // Core Fix: Force scene matrix tree recalculation before polling positions for Rapier
            if (playerGroup) {
                playerGroup.updateMatrixWorld(true);
            }

            // Sync WebXR Tracked Grips -> Rapier Kinematic Bodies
            physicalVoxelJoints.forEach((item) => {
                if (item.gripRef && item.gripRef.visible) {
                    item.mesh.visible = true;

                    // Capture absolute world coordinates (accounts for parent rig walking position updates)
                    item.mesh.getWorldPosition(tempPos);
                    item.mesh.getWorldQuaternion(tempQuat);

                    if (item.body) {
                        item.body.setNextKinematicTranslation({ x: tempPos.x, y: tempPos.y, z: tempPos.z });
                        item.body.setNextKinematicRotation({ x: tempQuat.x, y: tempQuat.y, z: tempQuat.z, w: tempQuat.w });
                    }
                } else {
                    item.mesh.visible = false;
                    if (item.body) {
                        item.body.setNextKinematicTranslation({ x: 0, y: -100, z: 0 }); // Move safely away
                    }
                }
            });

            if (physicsWorld) {
                physicsWorld.step();

                // Dynamic simulation sync updates
                physicsBodies.forEach(({ mesh, body }) => {
                    if (!body) return;
                    const t = body.translation();
                    const r = body.rotation();
                    mesh.position.set(t.x, t.y, t.z);
                    mesh.quaternion.set(r.x, r.y, r.z, r.w);
                });
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', onResize);
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>

</html>
